default_provider = "zai"
default_model = "glm-4.7"
default_temperature = 0.7

[model_providers.zai]
name = "zai"
base_url = "https://api.z.ai/api/coding/paas/v4"
api_key = "${env:PROVIDER_API_KEY}"
requires_openai_auth = true
kind = "openai-compatible"
timeout_ms = 30000

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
api_key = "${env:OPENROUTER_API_KEY}"
requires_openai_auth = true

[model_providers.nvidia]
name = "nvidia"
base_url = "https://integrate.api.nvidia.com/v1"
api_key = "${env:NVIDIA_API_KEY}"
requires_openai_auth = true

[model_providers.mistral]
name = "mistral"
base_url = "https://api.mistral.ai/v1"
api_key = "${env:MISTRAL_API_KEY}"
requires_openai_auth = true

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = [
    "git", "npm", "npx", "node", "ls", "cat", "pwd", "grep", "find", "echo", "mkdir", "tsc", "cargo", "rustup"
]
forbidden_paths = [
    "/etc", "/var", "/root", "C:\\Windows", "../", ".env", ".secret_key",
    "/proc", "/sys", "~/.ssh", "~/.gnupg", "~/.aws", "~/.docker", "~/.kube"
]
max_actions_per_hour = 40
max_cost_per_day_cents = 1000
block_high_risk_commands = true
auto_approve = ["file_read", "memory_recall"]

[runtime]
kind = "docker"
network = "none"
read_only_rootfs = true
mount_workspace = true

[agent]
max_history_messages = 35
compact_context = true
max_tool_iterations = 25

[skills]
open_skills_enabled = false

[channels_config]
cli = false
message_timeout_secs = 3600

[channels_config.telegram]
enabled = true
bot_token = "${env:TELEGRAM_BOT_TOKEN}"
allowed_users = ["${env:TELEGRAM_ALLOWED_USER}"]
stream_mode = "off"

[[model_routes]]
intent = ["coding", "refactor", "debug"]
hint = "Z.AI primary"
provider = "zai"
model = "glm-4.7"

[[model_routes]]
intent = ["coding", "refactor", "debug"]
hint = "Fallback for Z.AI block"
provider = "openrouter"
model = "google/gemini-2.0-flash-001"

[[model_routes]]
intent = ["architecture", "planning", "complex_logic"]
hint = "Z.AI high-level"
provider = "zai"
model = "glm-5"

[[model_routes]]
intent = ["architecture", "planning", "complex_logic"]
hint = "Fallback for architecture"
provider = "openrouter"
model = "anthropic/claude-3.5-sonnet"

[[model_routes]]
intent = ["summarization", "formatting", "quick_task"]
hint = "Z.AI quick task"
provider = "zai"
model = "glm-4.5-air"

[[model_routes]]
intent = ["summarization", "formatting", "quick_task"]
hint = "Fallback for quick tasks"
provider = "openrouter"
model = "google/gemini-2.0-flash-001"

[reliability]
provider_retries = 3
provider_backoff_ms = 1000

[memory]
backend = "sqlite"
auto_save = true
