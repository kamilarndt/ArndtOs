version: '3.8'

services:
  zeroclaw-runtime:
    build:
      context: .
      dockerfile: zeroclaw.Dockerfile
    container_name: zeroclaw-runtime
    restart: unless-stopped
    ports:
      - "42617:42617"
    env_file:
      - .env
    environment:
      - ZEROCLAW_CONFIG_PATH=/workspace/config.toml
      - ZEROCLAW_WORKSPACE=/workspace
      - PROVIDER_API_KEY=${PROVIDER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${PROVIDER_API_KEY}
      - ZAI_API_KEY=${PROVIDER_API_KEY}
      - API_KEY=${PROVIDER_API_KEY}
      - TERM=xterm-256color
      - COLUMNS=120
      - LINES=40
    volumes:
      # Mapujemy cały folder ArndtOs do /workspace wewnątrz kontenera
      - .:/workspace
      - ./claude_settings.json:/zeroclaw-data/.claude/settings.json
