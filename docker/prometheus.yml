# Prometheus configuration for ZeroClaw OS Dashboard
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'zeroclaw-os'

scrape_configs:
  - job_name: 'zeroclaw-daemon'
    static_configs:
      - targets: ['zeroclaw:8080']
        labels:
          service: 'zeroclaw-daemon'
          env: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Scrape Docker containers
  - job_name: 'docker'
    static_configs:
      - targets: ['172.17.0.1:9323']
        labels:
          service: 'docker'
